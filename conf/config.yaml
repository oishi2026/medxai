# Hydra root config. Compose run-specific configs on top of frozen.yaml.
# frozen.yaml is included read-only; per-run knobs (lr, batch size, epochs) go
# under `run:` and may differ between experiments — but never the frozen block.

defaults:
  - frozen
  - _self_

run:
  experiment: smoke
  lr: 1.0e-4
  batch_size: 32
  epochs: 1

wandb:
  project: medxai            # point ALL teammates at this one shared project
  entity: TODO               # your W&B team/org name
  mode: online              # "offline" if notebook internet is off
